<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术博客 - 简洁预览版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
        }

        .markdown-body h1 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .markdown-body p {
            margin-bottom: 1rem;
            color: #475569;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const {useState, useEffect} = React;

    // 配置后端接口地址
    const API_BASE_URL = 'http://localhost:3000/api/blog';

    function App() {
        const [posts, setPosts] = useState([]);
        const [loading, setLoading] = useState(true);
        const [selectedPost, setSelectedPost] = useState(null);
        const [showEditor, setShowEditor] = useState(false);
        const [newPost, setNewPost] = useState({title: '', content: '', category: '技术', tags: ''});

        // 获取文章列表
        const fetchPosts = async () => {
            setLoading(true);
            try {
                // 如果后端还没跑起来，这里会失败，我们可以用 Mock 数据演示
                const response = await fetch(API_BASE_URL);
                if (response.ok) {
                    const data = await response.json();
                    setPosts(data);
                } else {
                    throw new Error('Backend not reachable');
                }
            } catch (err) {
                console.log('Using mock data as backup');
                setPosts([
                    {
                        id: '1',
                        title: '示例文章：如何使用本模块',
                        content: '这是一篇演示内容。你可以通过 NestJS 后端发布真正的文章。',
                        category: '指南',
                        tags: ['NestJS', 'React'],
                        createdAt: new Date().toISOString()
                    }
                ]);
            }
            setLoading(false);
        };

        useEffect(() => {
            fetchPosts();
        }, []);

        const handleCreate = async (e) => {
            e.preventDefault();
            try {
                await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({...newPost, tags: newPost.tags.split(',')})
                });
                setShowEditor(false);
                fetchPosts();
            } catch (err) {
                alert('发布失败，请检查后端服务是否启动');
            }
        };

        return (
            <div className="min-h-screen">
                {/* Header */}
                <header className="bg-white shadow-sm sticky top-0 z-10">
                    <div className="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                        <h1 className="text-2xl font-bold text-indigo-600 flex items-center">
                            <i className="fas fa-blog mr-2"></i> TechBlog
                        </h1>
                        <button
                            onClick={() => setShowEditor(true)}
                            className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition"
                        >
                            <i className="fas fa-plus mr-2"></i>发布文章
                        </button>
                    </div>
                </header>

                {/* Main Content */}
                <main className="max-w-5xl mx-auto px-4 py-8">
                    {loading ? (
                        <div className="text-center py-20 text-gray-500">加载中...</div>
                    ) : (
                        <div className="grid gap-6">
                            {posts.map(post => (
                                <div
                                    key={post.id}
                                    onClick={() => setSelectedPost(post)}
                                    className="bg-white p-6 rounded-xl shadow-sm hover:shadow-md transition cursor-pointer border border-gray-100"
                                >
                                    <div className="flex justify-between items-start mb-2">
                                            <span
                                                className="text-xs font-semibold text-indigo-500 bg-indigo-50 px-2 py-1 rounded uppercase">
                                                {post.category}
                                            </span>
                                        <span className="text-sm text-gray-400">
                                                {new Date(post.createdAt).toLocaleDateString()}
                                            </span>
                                    </div>
                                    <h2 className="text-xl font-bold text-gray-800 mb-2">{post.title}</h2>
                                    <p className="text-gray-600 line-clamp-2 mb-4">{post.content}</p>
                                    <div className="flex gap-2">
                                        {post.tags.map(tag => (
                                            <span key={tag} className="text-xs text-gray-500">#{tag}</span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </main>

                {/* Post Detail Modal */}
                {selectedPost && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                        <div
                            className="bg-white w-full max-w-2xl max-h-[80vh] overflow-y-auto rounded-2xl p-8 relative">
                            <button onClick={() => setSelectedPost(null)}
                                    className="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                                <i className="fas fa-times text-xl"></i>
                            </button>
                            <div className="mb-6">
                                <span className="text-indigo-600 font-medium">{selectedPost.category}</span>
                                <h1 className="text-3xl font-bold mt-2">{selectedPost.title}</h1>
                                <p className="text-gray-400 text-sm mt-2">发布于 {new Date(selectedPost.createdAt).toLocaleString()}</p>
                            </div>
                            <div className="markdown-body text-gray-700 leading-relaxed whitespace-pre-wrap">
                                {selectedPost.content}
                            </div>
                        </div>
                    </div>
                )}

                {/* Editor Modal */}
                {showEditor && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                        <form onSubmit={handleCreate} className="bg-white w-full max-w-xl rounded-2xl p-8 relative">
                            <h2 className="text-xl font-bold mb-6 text-gray-800">创作新文章</h2>
                            <div className="space-y-4">
                                <input
                                    placeholder="文章标题"
                                    className="w-full border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                    value={newPost.title}
                                    onChange={e => setNewPost({...newPost, title: e.target.value})}
                                    required
                                />
                                <div className="flex gap-4">
                                    <input
                                        placeholder="分类"
                                        className="w-1/2 border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                        value={newPost.category}
                                        onChange={e => setNewPost({...newPost, category: e.target.value})}
                                    />
                                    <input
                                        placeholder="标签 (逗号隔开)"
                                        className="w-1/2 border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                        value={newPost.tags}
                                        onChange={e => setNewPost({...newPost, tags: e.target.value})}
                                    />
                                </div>
                                <textarea
                                    placeholder="正文内容..."
                                    rows="8"
                                    className="w-full border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                    value={newPost.content}
                                    onChange={e => setNewPost({...newPost, content: e.target.value})}
                                    required
                                ></textarea>
                            </div>
                            <div className="mt-8 flex gap-3">
                                <button type="submit"
                                        className="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700">发布
                                </button>
                                <button type="button" onClick={() => setShowEditor(false)}
                                        className="px-6 py-3 border rounded-lg text-gray-500">取消
                                </button>
                            </div>
                        </form>
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
</script>
</body>
</html>
