version: '3.8'

services:
  db:
    build:
      context: ./mysql        # 指向子目录
      dockerfile: Dockerfile
    container_name: screw_out-mysql
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - /var/lib/screw_out/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: screw_out

  api:
    build:
      # context 表示去哪里找 *.dockerfile
      context: ./nestjs-app   # 指向子目录，这样它会读取 ./nestjs-app/.dockerignore
      dockerfile: Dockerfile
    container_name: screw_out-nestjs
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password123
      DB_NAME: screw_out