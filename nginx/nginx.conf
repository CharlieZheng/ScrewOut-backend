# 定义 Nginx worker 进程的用户，默认为 nginx。一般无需修改。
# user  nginx;

# Nginx worker 进程数，通常设置为等于 CPU 核心数以获得最佳性能。
# auto 会自动检测核心数。
worker_processes  auto;

# 定义全局错误日志文件的位置和日志级别。
# error_log  /var/log/nginx/error.log notice;

# 定义主进程的进程 ID 文件。
# pid        /var/run/nginx.pid;

# events 块定义了 Nginx 的事件处理模型，例如网络连接。
events {
    # 每个 worker 进程可以处理的最大并发连接数。
    # 总并发数 = worker_processes * worker_connections
    worker_connections  1024;
}

# http 块是配置 HTTP 服务器的主要部分。
http {
    # 包含 /etc/nginx/mime.types 文件，该文件定义了文件扩展名与MIME类型的映射关系。
    include       /etc/nginx/mime.types;
    # 如果mime.types中没有找到匹配的类型，则使用此默认类型。
    default_type  application/octet-stream;

    # 定义日志格式，可以自定义。
    # log_format  main  '$remote_addr - $remote_user [$time_local] "$request" ' # ...

    # 定义访问日志文件的位置。
    # access_log  /var/log/nginx/access.log  main;

    # 开启高效的文件传输模式。对于提供静态文件下载非常有用。
    sendfile        on;

    # 开启 TCP_NOPUSH 选项，在 sendfile 开启的情况下，优化网络包的发送。
    # tcp_nopush     on;

    # 客户端连接的保持超时时间。在此时间内，同一个客户端的后续请求可以复用已建立的连接。
    keepalive_timeout  65;

    # 开启 Gzip 压缩，以减少传输数据的大小，加快网站加载速度。
    # gzip  on;

    # upstream 块定义了一个后端服务的集群（可以是一个或多个服务器）。
    # 我们给这个集群命名为 nestjs_app，方便后续引用。
    upstream nestjs_app {
        # server 指令定义了集群中的一台服务器地址。
        # `api` 是我们在 docker-compose.yml 中定义的 NestJS 服务的名称。
        # Docker 的内部 DNS 会将 `api` 解析为 NestJS 容器的内部 IP 地址。
        # `3000` 是 NestJS 应用在容器内监听的端口。
        server api:3000;
    }

    # 定义一个虚拟主机（Virtual Host），用于处理 HTTP 请求。
    server {
        # 监听 80 端口，这是标准的 HTTP 端口。
        listen 80;
        # 这个 server 块处理的目标域名。
        server_name gg-bond.fun;

        # 将所有到达 80 端口的 HTTP 请求，通过 301 永久重定向到对应的 HTTPS 地址。
        # $host 是请求的域名 (gg-bond.fun)，$request_uri 是请求的路径和参数 (e.g., /users?id=1)
        # 这是强制使用 HTTPS 的标准做法。
        return 301 https://$host$request_uri;
    }

    # 定义另一个虚拟主机，用于处理 HTTPS 请求。
    server {
        # 监听 443 端口，并启用 SSL/TLS 协议。
        listen 443 ssl;
        # 这个 server 块处理的目标域名。
        server_name gg-bond.fun;

        # 指定 SSL 证书文件（公钥）的路径。注意这是容器内的路径。
        ssl_certificate /etc/nginx/certs/gg-bond.fun_bundle.pem;
        # 指定 SSL 证书私钥的路径。注意这是容器内的路径。
        ssl_certificate_key /etc/nginx/certs/gg-bond.fun.key;

        # location 块定义了如何处理特定路径的请求。'/' 表示匹配所有请求。
        location / {
            # proxy_pass 指令将请求“反向代理”到之前定义的 upstream 集群。
            proxy_pass http://nestjs_app;

            # --- 以下是代理相关的头信息设置，非常重要 ---

            # 将原始请求的 Host 头字段传递给后端服务。
            # 这样 NestJS 应用才能知道原始请求的域名是什么。
            proxy_set_header Host $host;

            # 将客户端的真实 IP 地址传递给后端服务。
            proxy_set_header X-Real-IP $remote_addr;

            # 传递一个包含了客户端 IP 地址列表的头信息。
            # 如果经过了多层代理，这个头会记录下所有代理服务器的 IP。
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 传递客户端请求的协议（http 或 https）。
            # 这样 NestJS 应用就能知道客户端是通过 HTTPS 连接的，即使 Nginx 和 NestJS 之间是 HTTP 通信。
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 你可以在这里添加更多的 server 块来托管其他网站或服务。
}
